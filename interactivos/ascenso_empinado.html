<div style="background-color: #f8f9fa; padding: 25px; border-radius: 8px; border: 1px solid #e9ecef; max-width: 480px; margin: 20px auto; font-family: system-ui, -apple-system, sans-serif;">
  <h5 style="margin-top: 0; color: #2c3e50; text-align: center; margin-bottom: 15px;">Región de Exploración: Interfaz de Pruebas "Tork"</h5>
  
  <div style="margin-bottom: 15px;">
    <label style="display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; color: #34495e;">Velocidad Horizontal (Factor A):</label>
    <div style="display: flex; gap: 10px; align-items: center;">
      <input type="number" id="inputX1" value="0.0" step="0.1" style="width: 100px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; text-align: center;">
      <span style="font-size: 0.85em; color: #7f8c8d;">unidades codificadas (<math><msub><mi>x</mi><mn>1</mn></msub></math>)</span>
    </div>
    <div style="font-size: 0.8em; color: #95a5a6; margin-top: 4px; padding-left: 5px;">
      Equivalente natural: <strong id="natA">6000</strong> mm/s
    </div>
  </div>

  <div style="margin-bottom: 20px;">
    <label style="display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; color: #34495e;">Velocidad Vertical (Factor B):</label>
    <div style="display: flex; gap: 10px; align-items: center;">
      <input type="number" id="inputX2" value="0.0" step="0.1" style="width: 100px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; text-align: center;">
      <span style="font-size: 0.85em; color: #7f8c8d;">unidades codificadas (<math><msub><mi>x</mi><mn>2</mn></msub></math>)</span>
    </div>
    <div style="font-size: 0.8em; color: #95a5a6; margin-top: 4px; padding-left: 5px;">
      Equivalente natural: <strong id="natB">150</strong> mm/s
    </div>
  </div>

  <button onclick="ejecutarCorrida()" style="width: 100%; background-color: #34495e; color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: background 0.2s;">
    Ejecutar Corrida Experimental
  </button>

  <div style="margin-top: 20px; background-color: #ffffff; padding: 15px; border-radius: 6px; text-align: center; border: 1px solid #e9ecef;">
    <span style="font-size: 0.8em; text-transform: uppercase; color: #95a5a6; letter-spacing: 0.5px;">Distancia de desvío observada (Y)</span>
    <div id="resultadoY" style="font-size: 1.8em; font-weight: bold; color: #2c3e50; margin-top: 5px;">--</div>
  </div>
</div>

<script>
function ejecutarCorrida() {
  // Obtener y validar las entradas numéricas
  const x1 = parseFloat(document.getElementById('inputX1').value) || 0;
  const x2 = parseFloat(document.getElementById('inputX2').value) || 0;

  // Actualizar la equivalencia en unidades naturales mostrada en la interfaz
  // Centro inicial: A = 6000 (paso = 1000), B = 150 (paso = 30)
  document.getElementById('natA').innerText = Math.round(6000 + (x1 * 1000));
  document.getElementById('natB').innerText = Math.round(150 + (x2 * 30));

  // 1. Modelo matemático de base (Tendencia lineal del Amplificador)
  let yBase = 4.50 + (1.20 * x1) + (0.85 * x2);
  
  // 2. Simulación de la zona de inflexión (curvatura al descender)
  if (x1 < -3.0 || x2 < -2.0) {
    const excesoX1 = Math.max(0, -3.0 - x1);
    const excesoX2 = Math.max(0, -2.0 - x2);
    yBase = 0.81 + (excesoX1 * 1.5) + (excesoX2 * 1.5);
  }

  // 3. Inclusión del componente aleatorio (Error experimental puro)
  // Genera un número pseudoaleatorio usando la transformación de Box-Muller para aproximar una distribución normal
  // Media = 0, Desviación estándar (sigma) = 0.05 mm
  let u1 = Math.random();
  let u2 = Math.random();
  if(u1 === 0) u1 = 0.0001; // Evitar indeterminación por logaritmo de 0
  let errorAleatorio = Math.sqrt(-2.0 * Math.log(u1)) * Math.cos(2.0 * Math.PI * u2) * 0.05;

  // Respuesta final combinada
  let yObservada = yBase + errorAleatorio;

  // Restricción física: la distancia euclidiana de error no puede ser negativa
  yObservada = Math.max(0.35, yObservada);

  // Desplegar el resultado en la pantalla
  document.getElementById('resultadoY').innerText = yObservada.toFixed(3) + " mm";
}
</script>
