<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jstat/1.9.4/jstat.min.js"></script>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@700&display=swap">
    <style>
        /* Estilos base para que coincida con tu sitio */
        body {
            font-family: "Aller", sans-serif;
            margin: 0;
            /* Añadimos aire en los 4 costados */
            padding: 15px; 
            /* CRUCIAL: para que el padding no sume al ancho total y cause scroll */
            font-size: 18px; 
            line-height: 1.2;
            box-sizing: border-box; 
            background-color: transparent;
            overflow: hidden; 
        }
        
        /* Opcional: un poco de espacio entre el selector y los sliders */
        #controls {
            margin-top: 5px;
            margin-bottom: 5px;
        }

        label { font-weight: 600; font-size: 1.0em; }
        
        select {
        font-size: 15px;
        padding: 6px; /* Más fácil de clickear */
        }

        /* Estilo de los Sliders (Copiado de tu CSS) */
        input[type="range"] {
        -webkit-appearance: none;
        width: 300px; /* Tamaño fijo similar al de la imagen de la Normal */
        max-width: 80%; /* Para que no se rompa en móviles */
        height: 6px;
        background: #33111422;
        border-radius: 4px;
        outline: none;
        margin: 5px 0;
        display: inline-block; /* Permite alineación controlada */
        vertical-align: middle;
    }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px;
            background: #331114;
            border-radius: 50%;
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 14px; height: 14px;
            background: #331114;
            border-radius: 50%;
            cursor: pointer;
        }

          .main-container {
              padding: 10px;
              box-sizing: border-box;
          }
          
          #plot {
              width: 100%;
              height: 450px; /* Reducimos ligeramente para ganar espacio vertical */
              margin-top: 5px;
          }
          
          span[id$="-val"] {
          font-weight: bold;
          color: #331114; /* Usando tu color dorado de realce */
          margin-left: 10px;
          font-size: 0.9em;
          }
          
          label[for="dist-select"] {
          font-family: 'Aller', sans-serif;
          font-weight: bold;
          margin-right: 10px;
          }
          
        footer {
            margin-top: 0px;
            font-size: 0.8em;
            text-align: center;
            padding-bottom: 0px;
            color: gray;
        }
    </style>
</head>
<body>
    <div style="max-width: 900px; margin: 0 auto;">
        <label>Seleccione una distribución:</label>
        <select id="distribution" onchange="renderControls(); updatePlot();" style="padding: 4px; border-radius: 4px; border: 1px solid #33111455;">
            <option value="binomial">Binomial</option>
            <option value="neg_binomial">Binomial negativa</option>
            <option value="poisson">Poisson</option>
            <option value="hypergeometric">Hipergeométrica</option>
        </select>

        <div id="controls" style="margin-top: 15px;"></div>
        <div id="plot"></div>

        <script>
      function renderControls() {
        const dist = document.getElementById("distribution").value;
        const controls = document.getElementById("controls");
        let html = "";
  
        function controlSlider(id, label, min, max, value, step=1) {
          return `
            <label>
              ${label}:
              <input type="range" id="${id}" min="${min}" max="${max}" value="${value}" step="${step}" 
                oninput="updatePlot(); document.getElementById(\'${id}-val\').textContent = this.value;">
              <span id="${id}-val">${value}</span>
            </label><br>
          `;
        }
  
        if (dist === "binomial") {
          html += controlSlider("n", "n", 1, 50, 10);
          html += controlSlider("p", "p", 0, 1, 0.5, 0.01);
        } else if (dist === "neg_binomial") {
          html += controlSlider("r", "Número de éxitos (r)", 1, 50, 10);
          html += controlSlider("p", "p", 0, 1, 0.5, 0.01);
        } else if (dist === "poisson") {
          html += controlSlider("lambda", "λ", 0.1, 20, 4, 0.1);
        } else if (dist === "hypergeometric") {
          html += controlSlider("N", "Tamaño total (N)", 10, 100, 50);
          html += controlSlider("K", "Éxitos en la población (K)", 1, 50, 10);
          html += controlSlider("n", "Muestra (n)", 1, 50, 10);
        }
  
        controls.innerHTML = html;
      }
  
      function updatePlot() {
        const dist = document.getElementById("distribution").value;
        let x = [], y = [], trace = {};
  
        if (dist === "binomial") {
          const n = parseInt(document.getElementById("n").value);
          const p = parseFloat(document.getElementById("p").value);
          for (let i = 0; i <= n; i++) {
            x.push(i);
            y.push(jStat.binomial.pdf(i, n, p));
          }
          trace = { title: `Binomial (n=${n}, p=${p.toFixed(2)})` };
  
        } else if (dist === "neg_binomial") {
          const r = parseInt(document.getElementById("r").value);
          const p = parseFloat(document.getElementById("p").value);
          const mu = r * (1 - p) / p;
          const sigma = Math.sqrt(r * (1 - p) / (p * p));
          const max = Math.ceil(mu + 4 * sigma);
  
          for (let i = 0; i <= max; i++) {
            x.push(i);
            y.push(jStat.negbin.pdf(i, r, p));
          }
          trace = { title: `Binomial Negativa (r=${r}, p=${p.toFixed(2)})` };
  
        } else if (dist === "poisson") {
          const lambda = parseFloat(document.getElementById("lambda").value);
          const max = Math.ceil(lambda + 4 * Math.sqrt(lambda));
          for (let i = 0; i <= max; i++) {
            x.push(i);
            y.push(jStat.poisson.pdf(i, lambda));
          }
          trace = { title: `Poisson (λ=${lambda.toFixed(2)})` };
  
        } else if (dist === "hypergeometric") {
          const N = parseInt(document.getElementById("N").value);
          const K = parseInt(document.getElementById("K").value);
          const n = parseInt(document.getElementById("n").value);
          const minX = Math.max(0, n + K - N);
          const maxX = Math.min(K, n);
          for (let i = minX; i <= maxX; i++) {
            x.push(i);
            y.push(jStat.hypgeom.pdf(i, N, K, n));
          }
          trace = { title: `Hipergeométrica (N=${N}, K=${K}, n=${n})` };
        }
  
        Plotly.newPlot("plot", [{
          x: x,
          y: y,
          type: "bar",
          marker: { color: "#331114" }
        }], {
          title: { text: trace.title, font: { family: "Crimson Pro" } },
          xaxis: { title: "x", 
          titlefont: { family: "Aller" },
          tickfont: { family: "Aller" }},
          yaxis: { title: "Probabilidad", 
          titlefont: { family: "Aller" },
          tickfont: { family: "Aller" }},
          paper_bgcolor: 'rgba(0,0,0,0)',
          plot_bgcolor: 'rgba(0,0,0,0)'
        });
  
      }
      
      const params = new URLSearchParams(window.location.search);
      const distParam = params.get("dist");

      if (distParam) {
        const select = document.getElementById("distribution");
        if ([...select.options].some(o => o.value === distParam)) {
          select.value = distParam;
        }
      }
  
        renderControls();
        updatePlot();
    </script>
      <footer>
      Creado por Steven García Goñi <img src="https://stevenggoni.github.io/images/Cuervos_SinFondo-01.png" width="20" style="vertical-align:middle; margin-right:6px;">· Para la Escuela de Ingeniería Industrial de la Universidad de Costa Rica · Actualizado: Enero 2026
    </footer>
    </div>
</body>
</html>
